services:
  tubitak-mock-server-proxy:
    image: mockserver/mockserver:7.0.0
    ports:
      - 9988:9988
    networks:
      - shared
    environment:
      - SERVER_PORT=9988
      - MOCKSERVER_MAX_EXPECTATIONS=1000
      - MOCKSERVER_MAX_HEADER_SIZE=8192
  tubitak-mock-server:
    build: ./
    networks:
      - shared
    depends_on:
      - tubitak-mock-server-proxy
    environment:
      - MOCK_SERVER_HOST=tubitak-mock-server-proxy
      - MOCK_SERVER_PORT=9988
      - MOCK_EXRESS_SERVER_HOST=tubitak-mock-server
      - MOCK_EXRESS_SERVER_PORT=9987

networks:
  shared:
    driver: bridge
